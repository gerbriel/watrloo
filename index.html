<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Watrloo — find and rate public bathrooms near you."
    />
    <meta name="theme-color" content="#0284c7" />
    <title>Watrloo — rate public bathrooms</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the
      // wrong scheme. Absent attribute = follow the OS preference.
      (function () {
        try {
          var t = localStorage.getItem('watrloo-theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
